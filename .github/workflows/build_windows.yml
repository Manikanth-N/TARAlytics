name: Build Windows Installer

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3) — leave blank to use VERSION file'
        required: false
        default: ''

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Version ───────────────────────────────────────────────────────────
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("$env:GITHUB_REF" -match "^refs/tags/v(.+)$") {
            $version = $Matches[1]
          } else {
            $version = (Get-Content VERSION -Raw).Trim()
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $version"

      # ── 3. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. PyInstaller ───────────────────────────────────────────────────────
      - name: Build app bundle with PyInstaller
        run: python -m PyInstaller TARAlytics.spec --noconfirm --clean

      - name: Verify bundle exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\TARAlytics\TARAlytics.exe")) {
            Write-Error "TARAlytics.exe not found in dist\TARAlytics\"
            exit 1
          }
          $size = (Get-Item "dist\TARAlytics\TARAlytics.exe").Length / 1MB
          Write-Host "TARAlytics.exe: $([math]::Round($size, 1)) MB"

      # ── 5. Inno Setup installer ──────────────────────────────────────────────
      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version = "${{ steps.version.outputs.VERSION }}"
          Write-Host "Building installer version $version ..."
          & $iscc "/DAppVersion=$version" "installer\TARAlytics.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC.exe failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Verify installer exists
        shell: pwsh
        run: |
          $installer = Get-Item "dist\installer\TARAlytics_Setup_*.exe" -ErrorAction SilentlyContinue
          if (-not $installer) {
            Write-Error "Installer .exe not found in dist\installer\"
            exit 1
          }
          $size = $installer.Length / 1MB
          Write-Host "Installer: $($installer.Name) ($([math]::Round($size, 1)) MB)"

      # ── 6. Artifacts ─────────────────────────────────────────────────────────
      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TARAlytics-Windows-Installer-${{ steps.version.outputs.VERSION }}
          path: dist\installer\TARAlytics_Setup_*.exe
          retention-days: 30

      - name: Upload app bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TARAlytics-Windows-Bundle-${{ steps.version.outputs.VERSION }}
          path: dist\TARAlytics\
          retention-days: 30

      # ── 7. GitHub Release (tag pushes only) ──────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: TARAlytics ${{ steps.version.outputs.VERSION }}
          body: |
            ## TARAlytics ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download **TARAlytics_Setup_${{ steps.version.outputs.VERSION }}.exe**
            2. Run the installer — no additional software required.
               Python, Qt, NumPy, Pandas, and all other components are bundled.
            3. A Start Menu shortcut is created automatically.
               An optional Desktop shortcut is available during setup.

            ### System Requirements
            - Windows 10 or later (64-bit)
            - ~400 MB disk space
          files: dist\installer\TARAlytics_Setup_*.exe
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
